<!DOCTYPE html>
<html>
<head>
  <title>Auto LeetCode Submitter Config</title>
  <style>
    body { font-family: sans-serif; width: 300px; padding: 10px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input[type="text"], input[type="password"] { width: 100%; padding: 5px; margin-top: 5px; box-sizing: border-box; }
    button { margin-top: 15px; width: 100%; padding: 8px; background: #28a745; color: white; border: none; cursor: pointer; }
    button:hover { background: #218838; }
    #status { margin-top: 10px; color: green; display: none; }
    .note { font-size: 12px; color: #666; margin-top: 5px; }
  </style>
</head>
<body>
  <h2>Settings</h2>

  <label for="token">GitHub PAT:</label>
  <input type="password" id="token" placeholder="ghp_...">
  <div class="note">Requires 'repo' scope.</div>

  <label for="username">GitHub Username:</label>
  <input type="text" id="username" placeholder="e.g. arunbhardwaj">

  <label for="repo">Repository Name:</label>
  <input type="text" id="repo" placeholder="e.g. LeetHub-2.0">

  <button id="save">Save Credentials</button>

  <div id="status">Saved successfully!</div>

  <script src="popup.js"></script>
</body>
</html>
